<!DOCTYPE html> <script>(function(){const apps = [{"name":"Google Search","category":"Google","status":"blocked","note":"VPN 없이는 차단됩니다.","alt":"Bing(사용 가능) 또는 Baidu"},{"name":"Google Maps","category":"Google","status":"partial","note":"열리기는 하지만 중국 본토에서는 데이터가 부정확하거나 위치가 어긋날 수 있습니다.","alt":"Apple Maps, Amap 또는 Baidu Maps"},{"name":"Gmail","category":"Google","status":"blocked","note":"VPN 없이는 차단됩니다.","alt":"Outlook / Google이 아닌 이메일 서비스"},{"name":"YouTube","category":"Google","status":"blocked","note":"VPN 없이는 차단됩니다.","alt":"Bilibili(현지 서비스)"},{"name":"WhatsApp","category":"메신저","status":"blocked","note":"VPN 없이는 차단됩니다.","alt":"WeChat"},{"name":"Facebook","category":"소셜","status":"blocked","note":"VPN 없이는 차단됩니다.","alt":"WeChat Moments / RED"},{"name":"Instagram","category":"소셜","status":"blocked","note":"VPN 없이는 차단됩니다.","alt":"RED (Xiaohongshu)"},{"name":"X (Twitter)","category":"소셜","status":"blocked","note":"VPN 없이는 차단됩니다.","alt":"Weibo"},{"name":"Telegram","category":"메신저","status":"blocked","note":"VPN 없이는 차단됩니다.","alt":"WeChat"},{"name":"WeChat","category":"메신저","status":"works","note":"완전히 정상 작동합니다. 중국에서 기본적으로 가장 많이 쓰는 앱입니다."},{"name":"Apple services (iMessage, App Store)","category":"Apple","status":"works","note":"정상적으로 작동합니다."},{"name":"Microsoft / Bing / Outlook","category":"Microsoft","status":"works","note":"정상적으로 작동합니다."},{"name":"Booking.com","category":"여행","status":"works","note":"정상적으로 작동합니다."},{"name":"Airbnb","category":"여행","status":"works","note":"정상적으로 작동합니다."},{"name":"Trip.com","category":"여행","status":"works","note":"완전히 정상 작동하며 기차와 호텔 예약에 특히 유용합니다."},{"name":"Alipay","category":"결제","status":"works","note":"완전히 정상 작동하며 해외 카드도 지원합니다."},{"name":"Uber","category":"교통","status":"blocked","note":"중국 본토에서는 운영되지 않습니다.","alt":"DiDi"},{"name":"Netflix","category":"미디어","status":"blocked","note":"중국 본토에서는 이용할 수 없습니다.","alt":"현지 스트리밍 서비스 이용 또는 미리 다운로드"},{"name":"Spotify","category":"미디어","status":"blocked","note":"중국 본토에서는 이용할 수 없습니다.","alt":"QQ Music / 미리 오프라인 다운로드"}];

  const listEl = document.getElementById('app-list');
  const noResults = document.getElementById('no-results');
  const searchEl = document.getElementById('search');
  const filters = document.querySelectorAll('.status-filter');
  let activeStatus = 'all';

  const badge = {
    works: { cls: 'bg-green-100 text-green-800', label: '✅ 사용 가능' },
    partial: { cls: 'bg-amber-100 text-amber-800', label: '⚠️ 일부만 가능' },
    blocked: { cls: 'bg-red-100 text-red-800', label: '🚫 차단됨' },
  };

  function render() {
    const q = searchEl.value.trim().toLowerCase();
    const list = apps.filter((a) => {
      const matchStatus = activeStatus === 'all' || a.status === activeStatus;
      const matchQuery = !q || a.name.toLowerCase().includes(q) || a.category.toLowerCase().includes(q);
      return matchStatus && matchQuery;
    });

    listEl.innerHTML = list
      .map((a) => `
        <div class="card">
          <div class="flex items-start justify-between gap-3">
            <div>
              <h3 class="font-bold text-gray-900">${a.name}</h3>
              <span class="text-xs text-gray-400">${a.category}</span>
            </div>
            <span class="whitespace-nowrap rounded-full px-2.5 py-0.5 text-xs font-semibold ${badge[a.status].cls}">${badge[a.status].label}</span>
          </div>
          <p class="mt-2 text-sm text-gray-600">${a.note}</p>
          ${a.alt ? `<p class="mt-1.5 text-sm"><span class="text-gray-500">대신 사용:</span> <span class="font-medium text-brand-600">${a.alt}</span></p>` : ''}
        </div>`)
      .join('');

    noResults.classList.toggle('hidden', list.length > 0);
  }

  searchEl.addEventListener('input', render);
  filters.forEach((btn) => {
    btn.addEventListener('click', () => {
      activeStatus = btn.dataset.status;
      filters.forEach((b) => {
        const on = b === btn;
        b.classList.toggle('btn-primary', on);
        ['rounded-lg', 'border', 'border-gray-300', 'font-medium', 'text-gray-700'].forEach((c) => b.classList.toggle(c, !on));
      });
      render();
    });
  });

  render();
})();</script>
