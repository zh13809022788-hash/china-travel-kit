<!DOCTYPE html> <script>(function(){const apps = [{"name":"Google-Suche","category":"Google","status":"gesperrt","note":"Ohne VPN gesperrt.","alt":"Bing (funktioniert) oder Baidu"},{"name":"Google Maps","category":"Google","status":"teilweise","note":"Lädt, aber die Daten auf dem chinesischen Festland sind ungenau oder verschoben.","alt":"Apple Karten, Amap oder Baidu Maps"},{"name":"Gmail","category":"Google","status":"gesperrt","note":"Ohne VPN gesperrt.","alt":"Outlook oder ein E-Mail-Dienst ohne Google"},{"name":"YouTube","category":"Google","status":"gesperrt","note":"Ohne VPN gesperrt.","alt":"Bilibili (lokal)"},{"name":"WhatsApp","category":"Nachrichten","status":"gesperrt","note":"Ohne VPN gesperrt.","alt":"WeChat"},{"name":"Facebook","category":"Soziale Medien","status":"gesperrt","note":"Ohne VPN gesperrt.","alt":"WeChat Moments oder RED"},{"name":"Instagram","category":"Soziale Medien","status":"gesperrt","note":"Ohne VPN gesperrt.","alt":"RED (Xiaohongshu)"},{"name":"X (Twitter)","category":"Soziale Medien","status":"gesperrt","note":"Ohne VPN gesperrt.","alt":"Weibo"},{"name":"Telegram","category":"Nachrichten","status":"gesperrt","note":"Ohne VPN gesperrt.","alt":"WeChat"},{"name":"WeChat","category":"Nachrichten","status":"funktioniert","note":"Funktioniert vollständig und ist in China der Standard."},{"name":"Apple-Dienste (iMessage, App Store)","category":"Apple","status":"funktioniert","note":"Funktioniert normal."},{"name":"Microsoft / Bing / Outlook","category":"Microsoft","status":"funktioniert","note":"Funktioniert normal."},{"name":"Booking.com","category":"Reise","status":"funktioniert","note":"Funktioniert normal."},{"name":"Airbnb","category":"Reise","status":"funktioniert","note":"Funktioniert normal."},{"name":"Trip.com","category":"Reise","status":"funktioniert","note":"Funktioniert vollständig und ist ideal für Züge und Hotels."},{"name":"Alipay","category":"Bezahlen","status":"funktioniert","note":"Funktioniert vollständig und unterstützt ausländische Karten."},{"name":"Uber","category":"Verkehr","status":"gesperrt","note":"Auf dem chinesischen Festland nicht verfügbar.","alt":"DiDi"},{"name":"Netflix","category":"Medien","status":"gesperrt","note":"Auf dem chinesischen Festland nicht verfügbar.","alt":"Lokale Streaming-Dienste oder Inhalte vorher herunterladen"},{"name":"Spotify","category":"Medien","status":"gesperrt","note":"Auf dem chinesischen Festland nicht verfügbar.","alt":"QQ Music oder Musik vorher offline herunterladen"}];

  const listEl = document.getElementById('app-list');
  const noResults = document.getElementById('no-results');
  const searchEl = document.getElementById('search');
  const filters = document.querySelectorAll('.status-filter');
  let activeStatus = 'alle';

  const badge = {
    funktioniert: { cls: 'bg-green-100 text-green-800', label: '✅ Funktioniert' },
    teilweise: { cls: 'bg-amber-100 text-amber-800', label: '⚠️ Teilweise' },
    gesperrt: { cls: 'bg-red-100 text-red-800', label: '🚫 Gesperrt' },
  };

  function render() {
    const q = searchEl.value.trim().toLowerCase();
    const list = apps.filter((a) => {
      const matchStatus = activeStatus === 'alle' || a.status === activeStatus;
      const matchQuery = !q || a.name.toLowerCase().includes(q) || a.category.toLowerCase().includes(q);
      return matchStatus && matchQuery;
    });

    listEl.innerHTML = list
      .map((a) => `
        <div class="card">
          <div class="flex items-start justify-between gap-3">
            <div>
              <h3 class="font-bold text-gray-900">${a.name}</h3>
              <span class="text-xs text-gray-400">${a.category}</span>
            </div>
            <span class="whitespace-nowrap rounded-full px-2.5 py-0.5 text-xs font-semibold ${badge[a.status].cls}">${badge[a.status].label}</span>
          </div>
          <p class="mt-2 text-sm text-gray-600">${a.note}</p>
          ${a.alt ? `<p class="mt-1.5 text-sm"><span class="text-gray-500">Stattdessen nutzen:</span> <span class="font-medium text-brand-600">${a.alt}</span></p>` : ''}
        </div>`)
      .join('');

    noResults.classList.toggle('hidden', list.length > 0);
  }

  searchEl.addEventListener('input', render);
  filters.forEach((btn) => {
    btn.addEventListener('click', () => {
      activeStatus = btn.dataset.status;
      filters.forEach((b) => {
        const on = b === btn;
        b.classList.toggle('btn-primary', on);
        ['rounded-lg', 'border', 'border-gray-300', 'font-medium', 'text-gray-700'].forEach((c) => b.classList.toggle(c, !on));
      });
      render();
    });
  });

  render();
})();</script>
