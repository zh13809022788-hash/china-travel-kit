<!DOCTYPE html> <script type="module">const i=new Set(["德國","法國","義大利","西班牙","荷蘭","瑞士","愛爾蘭","挪威","日本","韓國","巴西","紐西蘭","馬來西亞","泰國","澳洲"]),r=new Set(["美國","英國","加拿大","澳洲","德國","法國","義大利","西班牙","荷蘭","日本","韓國","新加坡","瑞士","愛爾蘭","挪威","巴西","紐西蘭"]);function d(e,t){const a=i.has(e),s=r.has(e);return t==="transit"?s?{tone:"good",heading:"你很可能符合 240 小時過境免簽資格",body:`持 ${e} 護照經 China 前往第三國時，若從符合資格的口岸入境，通常可免簽停留最長 240 小時（10 天）。`,points:["你必須持有 240 小時內前往第三國或地區的已確認後續機票。","入境和出境必須經由指定過境口岸（多數主要國際機場符合資格）。","通常只能在入境省份或指定區域內活動，請查證該口岸的具體規定。"]}:{tone:"warn",heading:"你的國籍可能不適用過境免簽",body:`依據我們的資料，${e} 不在標準 240 小時過境免簽名單中。若符合條件，你仍可能適用一般免簽入境；否則可能需要申請過境（G）簽證。`,points:["先確認你的國籍是否適用一般免簽入境。","若不適用，請在出發前申請合適的簽證。"]}:a?{tone:"good",heading:"你很可能符合 30 天免簽入境資格",body:`持 ${e} 護照者，依目前單方面免簽政策，通常可因觀光、商務、探親或過境免簽進入 China 最長 30 天。`,points:["你的護照應至少有 6 個月有效期並有空白頁。","準備好後續/回程交通和住宿證明，以備移民官查驗。","30 天通常按每次入境計算，預訂前請確認最新口徑。"]}:s?{tone:"info",heading:"可能需要簽證，但過境免簽或許可用",body:`${e} 不在我們的 30 天觀光/商務免簽名單中，因此一般需要簽證。不過，如果你只是經 China 前往第三國，可能可改用 240 小時過境免簽。`,points:["若是專程造訪，請提前申請 L（旅遊）或 M（商務）簽證。","若是前往其他地方途中的中停，可能符合 240 小時過境免簽；可將「旅行類型」切換為過境再檢查。"]}:{tone:"warn",heading:"很可能需要簽證",body:`依據我們的資料，${e} 護照持有人進行此類行程時，一般需要簽證才能進入 China。請在出發前透過 China 大使館、領事館或授權簽證中心申請。`,points:["請在出發前預留充足時間申請 L（旅遊）或 M（商務）簽證。","通常需要邀請函或行程、飯店預訂與回程機票等資料。"]}}const l={good:"border-green-200 bg-green-50",warn:"border-amber-200 bg-amber-50",info:"border-blue-200 bg-blue-50"},c={good:"bg-green-600 text-white",warn:"bg-amber-500 text-white",info:"bg-blue-600 text-white"},b={good:"可能符合資格",warn:"可能需要簽證",info:"取決於你的行程"},g=document.getElementById("check-btn"),n=document.getElementById("result"),o=document.getElementById("result-card"),h=document.getElementById("country"),m=document.getElementById("trip");g?.addEventListener("click",()=>{if(!o||!n)return;const e=d(h.value,m.value);o.className=`card border ${l[e.tone]}`,o.innerHTML=`
      <span class="inline-block rounded-full px-3 py-0.5 text-xs font-semibold ${c[e.tone]}">${b[e.tone]}</span>
      <h2 class="mt-3 text-xl font-bold text-gray-900">${e.heading}</h2>
      <p class="mt-2 text-gray-700">${e.body}</p>
      <ul class="mt-4 list-disc space-y-1.5 pl-5 text-sm text-gray-600">
        ${e.points.map(t=>`<li>${t}</li>`).join("")}
      </ul>`,n.classList.remove("hidden"),n.scrollIntoView({behavior:"smooth",block:"start"})});</script>
