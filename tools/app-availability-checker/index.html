<!DOCTYPE html> <script>(function(){const apps = [{"name":"Google Search","category":"Google","status":"blocked","note":"Blocked without a VPN.","alt":"Bing (works) or Baidu"},{"name":"Google Maps","category":"Google","status":"partial","note":"Loads but data is inaccurate/offset in mainland China.","alt":"Apple Maps, Amap, or Baidu Maps"},{"name":"Gmail","category":"Google","status":"blocked","note":"Blocked without a VPN.","alt":"Outlook / a non-Google email"},{"name":"YouTube","category":"Google","status":"blocked","note":"Blocked without a VPN.","alt":"Bilibili (local)"},{"name":"WhatsApp","category":"Messaging","status":"blocked","note":"Blocked without a VPN.","alt":"WeChat"},{"name":"Facebook","category":"Social","status":"blocked","note":"Blocked without a VPN.","alt":"WeChat Moments / RED"},{"name":"Instagram","category":"Social","status":"blocked","note":"Blocked without a VPN.","alt":"RED (Xiaohongshu)"},{"name":"X (Twitter)","category":"Social","status":"blocked","note":"Blocked without a VPN.","alt":"Weibo"},{"name":"Telegram","category":"Messaging","status":"blocked","note":"Blocked without a VPN.","alt":"WeChat"},{"name":"WeChat","category":"Messaging","status":"works","note":"Works fully — the default in China."},{"name":"Apple services (iMessage, App Store)","category":"Apple","status":"works","note":"Works normally."},{"name":"Microsoft / Bing / Outlook","category":"Microsoft","status":"works","note":"Works normally."},{"name":"Booking.com","category":"Travel","status":"works","note":"Works normally."},{"name":"Airbnb","category":"Travel","status":"works","note":"Works normally."},{"name":"Trip.com","category":"Travel","status":"works","note":"Works fully — great for trains and hotels."},{"name":"Alipay","category":"Payment","status":"works","note":"Works fully — supports foreign cards."},{"name":"Uber","category":"Transport","status":"blocked","note":"Not operational in mainland China.","alt":"DiDi"},{"name":"Netflix","category":"Media","status":"blocked","note":"Not available in mainland China.","alt":"Local streaming or download beforehand"},{"name":"Spotify","category":"Media","status":"blocked","note":"Not available in mainland China.","alt":"QQ Music / download offline first"}];

  const listEl = document.getElementById('app-list');
  const noResults = document.getElementById('no-results');
  const searchEl = document.getElementById('search');
  const filters = document.querySelectorAll('.status-filter');
  let activeStatus = 'all';

  const badge = {
    works: { cls: 'bg-green-100 text-green-800', label: '✅ Works' },
    partial: { cls: 'bg-amber-100 text-amber-800', label: '⚠️ Partial' },
    blocked: { cls: 'bg-red-100 text-red-800', label: '🚫 Blocked' },
  };

  function render() {
    const q = searchEl.value.trim().toLowerCase();
    const list = apps.filter((a) => {
      const matchStatus = activeStatus === 'all' || a.status === activeStatus;
      const matchQuery = !q || a.name.toLowerCase().includes(q) || a.category.toLowerCase().includes(q);
      return matchStatus && matchQuery;
    });

    listEl.innerHTML = list
      .map((a) => `
        <div class="card">
          <div class="flex items-start justify-between gap-3">
            <div>
              <h3 class="font-bold text-gray-900">${a.name}</h3>
              <span class="text-xs text-gray-400">${a.category}</span>
            </div>
            <span class="whitespace-nowrap rounded-full px-2.5 py-0.5 text-xs font-semibold ${badge[a.status].cls}">${badge[a.status].label}</span>
          </div>
          <p class="mt-2 text-sm text-gray-600">${a.note}</p>
          ${a.alt ? `<p class="mt-1.5 text-sm"><span class="text-gray-500">Use instead:</span> <span class="font-medium text-brand-600">${a.alt}</span></p>` : ''}
        </div>`)
      .join('');

    noResults.classList.toggle('hidden', list.length > 0);
  }

  searchEl.addEventListener('input', render);
  filters.forEach((btn) => {
    btn.addEventListener('click', () => {
      activeStatus = btn.dataset.status;
      filters.forEach((b) => {
        const on = b === btn;
        b.classList.toggle('btn-primary', on);
        ['rounded-lg', 'border', 'border-gray-300', 'font-medium', 'text-gray-700'].forEach((c) => b.classList.toggle(c, !on));
      });
      render();
    });
  });

  render();
})();</script>
