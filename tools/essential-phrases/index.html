<!DOCTYPE html> <script type="module">const n=document.querySelectorAll(".phrase-filter"),c=document.querySelectorAll(".phrase-group"),l=document.getElementById("print-btn"),d=["rounded-lg","border","border-gray-300","px-3","py-1.5","text-sm","font-medium","text-gray-700","hover:border-brand-400"];n.forEach(e=>{e.addEventListener("click",()=>{const r=e.dataset.filter;c.forEach(t=>{t.classList.toggle("hidden",r!=="all"&&t.dataset.group!==r)}),n.forEach(t=>{const o=t===e;t.classList.toggle("btn-primary",o),d.forEach(s=>t.classList.toggle(s,!o))})})});l?.addEventListener("click",()=>window.print());</script>
