<!DOCTYPE html> <script>(function(){const forfaits = [{"id":1,"name":"Explorateur Chine 5 Go","data":5,"dataLabel":"5 Go","days":7,"price":9.5,"network":"China Unicom","note":"Permet d acceder aux applications habituellement restreintes"},{"id":2,"name":"Explorateur Chine 10 Go","data":10,"dataLabel":"10 Go","days":15,"price":16,"network":"China Unicom","note":"Permet d acceder aux applications habituellement restreintes"},{"id":3,"name":"Chine continentale Essentiel 3 Go","data":3,"dataLabel":"3 Go","days":7,"price":6.5,"network":"China Mobile","note":"Reseau local, sans routage via VPN"},{"id":4,"name":"Grande Chine 8 Go","data":8,"dataLabel":"8 Go","days":30,"price":18.9,"network":"China Unicom","note":"Couvre la Chine, Hong Kong, Macao et Taiwan"},{"id":5,"name":"Illimite quotidien","data":9999,"dataLabel":"Illimite*","days":10,"price":29,"network":"China Unicom","note":"Usage raisonnable applique apres 2 Go par jour"},{"id":6,"name":"Pro 20 Go","data":20,"dataLabel":"20 Go","days":30,"price":32,"network":"China Unicom","note":"Permet d acceder aux applications habituellement restreintes"},{"id":7,"name":"Court sejour 1 Go","data":1,"dataLabel":"1 Go","days":3,"price":3.2,"network":"China Mobile","note":"Ideal pour les escales rapides"},{"id":8,"name":"Famille 30 Go","data":30,"dataLabel":"30 Go","days":30,"price":45,"network":"China Unicom","note":"Partage de connexion autorise"}];

  const lignesEl = document.getElementById('lignes-forfaits');
  const aucunResultat = document.getElementById('aucun-resultat');
  const tri = document.getElementById('tri');
  const filtreReseau = document.getElementById('filtre-reseau');
  const filtreDonnees = document.getElementById('filtre-donnees');

  function afficher() {
    let liste = [...forfaits];
    const reseau = filtreReseau.value;
    const donneesMin = Number(filtreDonnees.value);

    if (reseau !== 'tous') liste = liste.filter((p) => p.network === reseau);
    if (donneesMin > 0) liste = liste.filter((p) => p.data >= donneesMin);

    switch (tri.value) {
      case 'prix-croissant': liste.sort((a, b) => a.price - b.price); break;
      case 'prix-decroissant': liste.sort((a, b) => b.price - a.price); break;
      case 'donnees-decroissant': liste.sort((a, b) => b.data - a.data); break;
      case 'validite-decroissant': liste.sort((a, b) => b.days - a.days); break;
    }

    lignesEl.innerHTML = liste
      .map(
        (p) => `
      <tr class="border-b border-gray-100">
        <td class="py-3 pr-4 font-semibold text-gray-900">${p.name}</td>
        <td class="py-3 pr-4">${p.dataLabel}</td>
        <td class="py-3 pr-4">${p.days} jours</td>
        <td class="py-3 pr-4 font-semibold">$${p.price.toFixed(2)}</td>
        <td class="py-3 pr-4">${p.network}</td>
        <td class="py-3 pr-4 text-gray-500">${p.note}</td>
      </tr>`
      )
      .join('');

    aucunResultat.classList.toggle('hidden', liste.length > 0);
  }

  [tri, filtreReseau, filtreDonnees].forEach((el) => el.addEventListener('change', afficher));
  afficher();
})();</script>
