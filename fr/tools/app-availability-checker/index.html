<!DOCTYPE html> <script>(function(){const apps = [{"name":"Recherche Google","category":"Google","status":"bloque","note":"Bloquée sans VPN.","alt":"Bing (fonctionne) ou Baidu"},{"name":"Google Maps","category":"Google","status":"limite","note":"Se charge, mais les données sont inexactes ou décalées en Chine continentale.","alt":"Apple Maps, Amap ou Baidu Maps"},{"name":"Gmail","category":"Google","status":"bloque","note":"Bloqué sans VPN.","alt":"Outlook ou une autre messagerie non Google"},{"name":"YouTube","category":"Google","status":"bloque","note":"Bloqué sans VPN.","alt":"Bilibili (local)"},{"name":"WhatsApp","category":"Messagerie","status":"bloque","note":"Bloqué sans VPN.","alt":"WeChat"},{"name":"Facebook","category":"Réseaux sociaux","status":"bloque","note":"Bloqué sans VPN.","alt":"Moments sur WeChat ou RED"},{"name":"Instagram","category":"Réseaux sociaux","status":"bloque","note":"Bloqué sans VPN.","alt":"RED (Xiaohongshu)"},{"name":"X (Twitter)","category":"Réseaux sociaux","status":"bloque","note":"Bloqué sans VPN.","alt":"Weibo"},{"name":"Telegram","category":"Messagerie","status":"bloque","note":"Bloqué sans VPN.","alt":"WeChat"},{"name":"WeChat","category":"Messagerie","status":"fonctionne","note":"Fonctionne parfaitement : c’est l’application de référence en Chine."},{"name":"Services Apple (iMessage, App Store)","category":"Apple","status":"fonctionne","note":"Fonctionnent normalement."},{"name":"Microsoft / Bing / Outlook","category":"Microsoft","status":"fonctionne","note":"Fonctionnent normalement."},{"name":"Booking.com","category":"Voyage","status":"fonctionne","note":"Fonctionne normalement."},{"name":"Airbnb","category":"Voyage","status":"fonctionne","note":"Fonctionne normalement."},{"name":"Trip.com","category":"Voyage","status":"fonctionne","note":"Fonctionne parfaitement, idéal pour les trains et les hôtels."},{"name":"Alipay","category":"Paiement","status":"fonctionne","note":"Fonctionne pleinement et accepte les cartes étrangères."},{"name":"Uber","category":"Transport","status":"bloque","note":"Ne fonctionne pas en Chine continentale.","alt":"DiDi"},{"name":"Netflix","category":"Médias","status":"bloque","note":"Non disponible en Chine continentale.","alt":"Streaming local ou téléchargements avant le départ"},{"name":"Spotify","category":"Médias","status":"bloque","note":"Non disponible en Chine continentale.","alt":"QQ Music ou téléchargements hors ligne avant le départ"}];

  const listEl = document.getElementById('app-list');
  const noResults = document.getElementById('no-results');
  const searchEl = document.getElementById('search');
  const filters = document.querySelectorAll('.status-filter');
  let activeStatus = 'tous';

  const badge = {
    fonctionne: { cls: 'bg-green-100 text-green-800', label: 'Fonctionne' },
    limite: { cls: 'bg-amber-100 text-amber-800', label: 'Limité' },
    bloque: { cls: 'bg-red-100 text-red-800', label: 'Bloqué' },
  };

  function render() {
    const q = searchEl.value.trim().toLowerCase();
    const list = apps.filter((a) => {
      const matchStatus = activeStatus === 'tous' || a.status === activeStatus;
      const matchQuery = !q || a.name.toLowerCase().includes(q) || a.category.toLowerCase().includes(q);
      return matchStatus && matchQuery;
    });

    listEl.innerHTML = list
      .map((a) => `
        <div class="card">
          <div class="flex items-start justify-between gap-3">
            <div>
              <h3 class="font-bold text-gray-900">${a.name}</h3>
              <span class="text-xs text-gray-400">${a.category}</span>
            </div>
            <span class="whitespace-nowrap rounded-full px-2.5 py-0.5 text-xs font-semibold ${badge[a.status].cls}">${badge[a.status].label}</span>
          </div>
          <p class="mt-2 text-sm text-gray-600">${a.note}</p>
          ${a.alt ? `<p class="mt-1.5 text-sm"><span class="text-gray-500">Alternative conseillée :</span> <span class="font-medium text-brand-600">${a.alt}</span></p>` : ''}
        </div>`)
      .join('');

    noResults.classList.toggle('hidden', list.length > 0);
  }

  searchEl.addEventListener('input', render);
  filters.forEach((btn) => {
    btn.addEventListener('click', () => {
      activeStatus = btn.dataset.status;
      filters.forEach((b) => {
        const on = b === btn;
        b.classList.toggle('btn-primary', on);
        ['rounded-lg', 'border', 'border-gray-300', 'font-medium', 'text-gray-700'].forEach((c) => b.classList.toggle(c, !on));
      });
      render();
    });
  });

  render();
})();</script>
