<!DOCTYPE html> <script type="module">const p={budget:{food:80,transport:30,activities:40,misc:30},mid:{food:180,transport:70,activities:100,misc:60},comfort:{food:400,transport:200,activities:220,misc:130}},h={budget:150,mid:450,comfort:1100},E={tier1:1.25,tier2:1,tier3:.8},t=e=>`¥${Math.round(e).toLocaleString()}`,g=e=>`$${Math.round(e/7.2).toLocaleString()}`,$=document.getElementById("calc-btn"),n=document.getElementById("result"),x=document.getElementById("budget-card"),y=document.getElementById("cash-card"),u=document.getElementById("breakdown-card"),M=document.getElementById("nights"),B=document.getElementById("travelers"),I=document.getElementById("style"),T=document.getElementById("tier");function L(){if(!x||!y||!u||!n)return;const e=Math.max(1,Math.min(60,Number(M.value)||1)),d=Math.max(1,Math.min(10,Number(B.value)||1)),l=I.value,b=T.value,a=E[b],s=p[l],c=(s.food+s.transport+s.activities+s.misc)*a,f=Math.ceil(d/2),r=h[l]*a*f*e,i=c*d*e,o=i+r,v=Math.min(c*.15*d,200*d),m=Math.min(v*e,2e3+100*d);x.innerHTML=`
