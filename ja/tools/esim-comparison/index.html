<!DOCTYPE html> <script>(function(){const plans = [{"id":1,"name":"中国周遊 5GB","data":5,"dataLabel":"5GB","days":7,"price":9.5,"network":"China Unicom","note":"現地アプリの制限を回避しやすいプランです。"},{"id":2,"name":"中国周遊 10GB","data":10,"dataLabel":"10GB","days":15,"price":16,"network":"China Unicom","note":"現地アプリの制限を回避しやすいプランです。"},{"id":3,"name":"中国本土ライト 3GB","data":3,"dataLabel":"3GB","days":7,"price":6.5,"network":"China Mobile","note":"現地ネットワークを利用するタイプで、VPN経由ではありません。"},{"id":4,"name":"グレーター・チャイナ 8GB","data":8,"dataLabel":"8GB","days":30,"price":18.9,"network":"China Unicom","note":"中国本土、香港、マカオ、台湾で利用できます。"},{"id":5,"name":"1日使い放題","data":9999,"dataLabel":"無制限*","days":10,"price":29,"network":"China Unicom","note":"1日あたり2GBを超えると、公平利用ポリシーにより速度制限がかかります。"},{"id":6,"name":"ビジネス 20GB","data":20,"dataLabel":"20GB","days":30,"price":32,"network":"China Unicom","note":"現地アプリの制限を回避しやすいプランです。"},{"id":7,"name":"短期滞在 1GB","data":1,"dataLabel":"1GB","days":3,"price":3.2,"network":"China Mobile","note":"短時間の乗り継ぎや短期滞在に向いています。"},{"id":8,"name":"ファミリー 30GB","data":30,"dataLabel":"30GB","days":30,"price":45,"network":"China Unicom","note":"テザリングで家族や同行者と共有できます。"}];

  const rowsEl = document.getElementById('plan-rows');
  const noResults = document.getElementById('no-results');
  const sortBy = document.getElementById('sort-by');
  const filterNetwork = document.getElementById('filter-network');
  const filterData = document.getElementById('filter-data');

  function render() {
    let list = [...plans];
    const net = filterNetwork.value;
    const minData = Number(filterData.value);

    if (net !== 'all') list = list.filter((p) => p.network === net);
    if (minData > 0) list = list.filter((p) => p.data >= minData);

    switch (sortBy.value) {
      case 'price-asc': list.sort((a, b) => a.price - b.price); break;
      case 'price-desc': list.sort((a, b) => b.price - a.price); break;
      case 'data-desc': list.sort((a, b) => b.data - a.data); break;
      case 'days-desc': list.sort((a, b) => b.days - a.days); break;
    }

    rowsEl.innerHTML = list
      .map(
        (p) => `
      <tr class="border-b border-gray-100">
        <td class="py-3 pr-4 font-semibold text-gray-900">${p.name}</td>
        <td class="py-3 pr-4">${p.dataLabel}</td>
        <td class="py-3 pr-4">${p.days}日間</td>
        <td class="py-3 pr-4 font-semibold">米ドル ${p.price.toFixed(2)}</td>
        <td class="py-3 pr-4">${p.network}</td>
        <td class="py-3 pr-4 text-gray-500">${p.note}</td>
      </tr>`
      )
      .join('');

    noResults.classList.toggle('hidden', list.length > 0);
  }

  [sortBy, filterNetwork, filterData].forEach((el) => el.addEventListener('change', render));
  render();
})();</script>
