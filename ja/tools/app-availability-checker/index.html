<!DOCTYPE html> <script>(function(){const apps = [{"name":"Google Search","category":"Google","status":"blocked","note":"VPNなしでは使えません。","alt":"Bing（利用できます）または Baidu"},{"name":"Google Maps","category":"Google","status":"partial","note":"表示はできますが、中国本土では位置情報や地図データにずれが生じることがあります。","alt":"Apple Maps、Amap、または Baidu Maps"},{"name":"Gmail","category":"Google","status":"blocked","note":"VPNなしでは使えません。","alt":"Outlook または Google以外のメールサービス"},{"name":"YouTube","category":"Google","status":"blocked","note":"VPNなしでは使えません。","alt":"Bilibili（現地のサービスです）"},{"name":"WhatsApp","category":"メッセージ","status":"blocked","note":"VPNなしでは使えません。","alt":"WeChat"},{"name":"Facebook","category":"SNS","status":"blocked","note":"VPNなしでは使えません。","alt":"WeChat Moments または RED"},{"name":"Instagram","category":"SNS","status":"blocked","note":"VPNなしでは使えません。","alt":"RED（Xiaohongshu）"},{"name":"X (Twitter)","category":"SNS","status":"blocked","note":"VPNなしでは使えません。","alt":"Weibo"},{"name":"Telegram","category":"メッセージ","status":"blocked","note":"VPNなしでは使えません。","alt":"WeChat"},{"name":"WeChat","category":"メッセージ","status":"works","note":"問題なく使えます。中国では定番のアプリです。"},{"name":"Appleのサービス（iMessage、App Store）","category":"Apple","status":"works","note":"通常どおり使えます。"},{"name":"Microsoft / Bing / Outlook","category":"Microsoft","status":"works","note":"通常どおり使えます。"},{"name":"Booking.com","category":"旅行","status":"works","note":"通常どおり使えます。"},{"name":"Airbnb","category":"旅行","status":"works","note":"通常どおり使えます。"},{"name":"Trip.com","category":"旅行","status":"works","note":"問題なく使えます。列車やホテルの予約に便利です。"},{"name":"Alipay","category":"決済","status":"works","note":"問題なく使えます。海外発行のカードにも対応しています。"},{"name":"Uber","category":"交通","status":"blocked","note":"中国本土では使えません。","alt":"DiDi"},{"name":"Netflix","category":"メディア","status":"blocked","note":"中国本土では使えません。","alt":"現地の動画配信サービス、または事前ダウンロード"},{"name":"Spotify","category":"メディア","status":"blocked","note":"中国本土では使えません。","alt":"QQ Music または事前のオフライン保存"}];

  const listEl = document.getElementById('app-list');
  const noResults = document.getElementById('no-results');
  const searchEl = document.getElementById('search');
  const filters = document.querySelectorAll('.status-filter');
  let activeStatus = 'all';

  const badge = {
    works: { cls: 'bg-green-100 text-green-800', label: '✅ 使えます' },
    partial: { cls: 'bg-amber-100 text-amber-800', label: '⚠️ 一部のみ使えます' },
    blocked: { cls: 'bg-red-100 text-red-800', label: '🚫 使えません' },
  };

  function render() {
    const q = searchEl.value.trim().toLowerCase();
    const list = apps.filter((a) => {
      const matchStatus = activeStatus === 'all' || a.status === activeStatus;
      const matchQuery = !q || a.name.toLowerCase().includes(q) || a.category.toLowerCase().includes(q);
      return matchStatus && matchQuery;
    });

    listEl.innerHTML = list
      .map((a) => `
        <div class="card">
          <div class="flex items-start justify-between gap-3">
            <div>
              <h3 class="font-bold text-gray-900">${a.name}</h3>
              <span class="text-xs text-gray-400">${a.category}</span>
            </div>
            <span class="whitespace-nowrap rounded-full px-2.5 py-0.5 text-xs font-semibold ${badge[a.status].cls}">${badge[a.status].label}</span>
          </div>
          <p class="mt-2 text-sm text-gray-600">${a.note}</p>
          ${a.alt ? `<p class="mt-1.5 text-sm"><span class="text-gray-500">代わりに使えるアプリ・サービスはこちらです：</span> <span class="font-medium text-brand-600">${a.alt}</span></p>` : ''}
        </div>`)
      .join('');

    noResults.classList.toggle('hidden', list.length > 0);
  }

  searchEl.addEventListener('input', render);
  filters.forEach((btn) => {
    btn.addEventListener('click', () => {
      activeStatus = btn.dataset.status;
      filters.forEach((b) => {
        const on = b === btn;
        b.classList.toggle('btn-primary', on);
        ['rounded-lg', 'border', 'border-gray-300', 'font-medium', 'text-gray-700'].forEach((c) => b.classList.toggle(c, !on));
      });
      render();
    });
  });

  render();
})();</script>
