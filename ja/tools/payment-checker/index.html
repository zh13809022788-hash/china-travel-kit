      <h3 class="text-lg font-bold text-gray-900">${e}</h3>
      <span class="mt-2 inline-block rounded-full border px-3 py-0.5 text-xs font-semibold ${r(t.status)}">${t.status}</span>
      <dl class="mt-4 space-y-2 text-sm">
        <div class="flex justify-between gap-4"><dt class="text-gray-500">1回あたりの取引上限</dt><dd class="font-medium text-gray-900">${t.single}</dd></div>
        <div class="flex justify-between gap-4"><dt class="text-gray-500">1日あたりの上限</dt><dd class="font-medium text-gray-900">${t.daily}</dd></div>

        <div class="pt-2 text-gray-600"><dt class="text-gray-500">設定方法</dt><dd class="mt-1">${t.how}</dd></div>
      </dl>`}const n=document.getElementById("check-btn"),a=document.getElementById("result"),c=document.getElementById("network"),d=document.getElementById("alipay-card"),l=document.getElementById("wechat-card");n?.addEventListener("click",()=>{const e=c.value,t=i[e];!t||!d||!l||!a||(d.innerHTML=s("Alipay",t.alipay),l.innerHTML=s("WeChat Pay",t.wechat),a.classList.remove("hidden"),a.scrollIntoView({behavior:"smooth",block:"start"}))});</script>
