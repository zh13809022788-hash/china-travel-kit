name: Validate & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: validate-and-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Build & Validate
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
      - name: Verify build output
        run: |
          if [ ! -f dist/index.html ]; then echo "::error::dist/index.html not found"; exit 1; fi
          if [ ! -f public/search-index.json ]; then echo "::error::public/search-index.json not found"; exit 1; fi
          PAGE_COUNT=$(find dist -name index.html -o -name 404.html | wc -l)
          echo "Generated ${PAGE_COUNT} HTML pages"
          if [ "$PAGE_COUNT" -lt 700 ]; then echo "::error::Expected at least 700 HTML pages"; exit 1; fi
          echo "Build output verified"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1
      - id: check
        run: echo "should_deploy=true" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.should_deploy == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Include Pages Functions
        run: cp -r functions/ dist/functions/ 2>/dev/null || true
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
          directory: ./dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "Deployed successfully"
