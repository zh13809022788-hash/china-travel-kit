name: Validate & Deploy

# 这个工作流在每次 push 到 main 时运行：
# 1. 验证代码完整性（<slot />、BOM、构建测试）
# 2. 只有全部通过才部署到 Cloudflare Pages
# 3. 任何一项失败都会阻止部署
#
# ⚠️ 要完全生效，需要在 Cloudflare Dashboard 中关闭 Git 自动部署：
#    Pages → china-travel-kit → Settings → Builds & deployments
#    → Production branch → 设为 "None" 或取消 "Automatic deployments"
#    这样只有本工作流能触发部署。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: validate-and-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: 🔍 Validate code
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check BaseLayout <slot />
        run: |
          if ! grep -qP '<slot\s*/?>' src/layouts/BaseLayout.astro | grep -v 'name='; then
            if grep -qP '<slot\s*/?>' src/layouts/BaseLayout.astro; then
              echo "✓ <slot /> found in BaseLayout"
            else
              echo "::error::BaseLayout.astro is missing <slot /> — this causes blank pages!"
              exit 1
            fi
          else
            echo "✓ <slot /> found in BaseLayout"
          fi

      - name: Check for BOM corruption
        run: |
          FOUND=0
          for f in $(find src/pages -name "*.astro"); do
            if head -c 3 "$f" | grep -qP '\xef\xbb\xbf'; then
              echo "::error::$f has UTF-8 BOM — will break build"
              FOUND=1
            fi
          done
          if [ "$FOUND" = "1" ]; then exit 1; fi
          echo "✓ No BOM corruption found"

      - name: Check for empty frontmatter
        run: |
          FOUND=0
          for f in $(find src/pages -name "*.astro"); do
            if head -2 "$f" | grep -qP '^---$' && head -2 "$f" | tail -1 | grep -qP '^---$'; then
              echo "::error::$f has empty frontmatter (---\\n---)"
              FOUND=1
            fi
          done
          if [ "$FOUND" = "1" ]; then exit 1; fi
          echo "✓ No empty frontmatter found"

      - name: Install dependencies
        run: npm ci

      - name: Run prebuild validation
        run: npm run validate:layout

      - name: Build site
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f dist/index.html ]; then
            echo "::error::dist/index.html not found — build failed"
            exit 1
          fi
          SIZE=$(wc -c < dist/index.html)
          if [ "$SIZE" -lt 10000 ]; then
            echo "::error::dist/index.html is only $SIZE bytes — likely broken"
            exit 1
          fi
          echo "✓ Build output verified: index.html is $SIZE bytes"

      - name: Check HTML structure
        run: |
          # Verify </body></html> is at the END of the file (not in the middle)
          if tail -c 100 dist/index.html | grep -qP '</body>\s*</html>\s*$'; then
            echo "✓ HTML structure correct: </body></html> at end of file"
          else
            echo "::error::HTML structure broken: </body></html> not at end of file"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

      - id: check
        run: echo "should_deploy=true" >> $GITHUB_OUTPUT

  deploy:
    name: 🚀 Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.should_deploy == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
          directory: './dist'

      - name: Notify success
        run: echo "✅ Deployed successfully to Cloudflare Pages"
