<!DOCTYPE html> <script type="module">const s=document.querySelectorAll(".phrase-filter"),a=document.querySelectorAll(".phrase-group"),n=document.getElementById("print-btn"),l=["rounded-lg","border","border-gray-300","px-3","py-1.5","text-sm","font-medium","text-gray-700","hover:border-brand-400"];s.forEach(e=>{e.addEventListener("click",()=>{const r=e.dataset.filter;a.forEach(t=>{t.classList.toggle("hidden",r!=="all"&&t.dataset.group!==r)}),s.forEach(t=>{const o=t===e;t.classList.toggle("btn-primary",o),l.forEach(c=>t.classList.toggle(c,!o))})})});n?.addEventListener("click",()=>window.print());</script>
