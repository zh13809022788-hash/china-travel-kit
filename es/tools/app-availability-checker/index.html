<!DOCTYPE html> <script>(function(){const apps = [{"name":"Búsqueda de Google","category":"Google","status":"bloqueada","note":"Está bloqueada sin VPN.","alt":"Bing (funciona) o Baidu"},{"name":"Google Maps","category":"Google","status":"parcial","note":"Carga, pero los datos pueden ser imprecisos o aparecer desplazados en China continental.","alt":"Apple Maps, Amap o Baidu Maps"},{"name":"Gmail","category":"Google","status":"bloqueada","note":"Está bloqueado sin VPN.","alt":"Outlook u otro servicio de correo que no sea de Google"},{"name":"YouTube","category":"Google","status":"bloqueada","note":"Está bloqueado sin VPN.","alt":"Bilibili (local)"},{"name":"WhatsApp","category":"Mensajería","status":"bloqueada","note":"Está bloqueado sin VPN.","alt":"WeChat"},{"name":"Facebook","category":"Redes sociales","status":"bloqueada","note":"Está bloqueado sin VPN.","alt":"Moments de WeChat o RED"},{"name":"Instagram","category":"Redes sociales","status":"bloqueada","note":"Está bloqueado sin VPN.","alt":"RED (Xiaohongshu)"},{"name":"X (Twitter)","category":"Redes sociales","status":"bloqueada","note":"Está bloqueado sin VPN.","alt":"Weibo"},{"name":"Telegram","category":"Mensajería","status":"bloqueada","note":"Está bloqueado sin VPN.","alt":"WeChat"},{"name":"WeChat","category":"Mensajería","status":"funciona","note":"Funciona sin problemas; es la app más utilizada en China."},{"name":"Servicios de Apple (iMessage, App Store)","category":"Apple","status":"funciona","note":"Funcionan con normalidad."},{"name":"Microsoft / Bing / Outlook","category":"Microsoft","status":"funciona","note":"Funcionan con normalidad."},{"name":"Booking.com","category":"Viajes","status":"funciona","note":"Funciona con normalidad."},{"name":"Airbnb","category":"Viajes","status":"funciona","note":"Funciona con normalidad."},{"name":"Trip.com","category":"Viajes","status":"funciona","note":"Funciona sin problemas; es muy útil para reservar trenes y hoteles."},{"name":"Alipay","category":"Pagos","status":"funciona","note":"Funciona sin problemas y acepta tarjetas extranjeras."},{"name":"Uber","category":"Transporte","status":"bloqueada","note":"No opera en China continental.","alt":"DiDi"},{"name":"Netflix","category":"Entretenimiento","status":"bloqueada","note":"No está disponible en China continental.","alt":"Plataformas locales o contenido descargado de antemano"},{"name":"Spotify","category":"Entretenimiento","status":"bloqueada","note":"No está disponible en China continental.","alt":"QQ Music o música descargada previamente"}];


  const listaEl = document.getElementById('app-list');

  const sinResultadosEl = document.getElementById('no-results');

  const busquedaEl = document.getElementById('search');

  const filtros = document.querySelectorAll('.status-filter');

  let estadoActivo = 'todas';



  const insignias = {
    funciona: { cls: 'bg-green-100 text-green-800', label: '✅ Funcionan' },
    parcial: { cls: 'bg-amber-100 text-amber-800', label: '⚠️ Funcionamiento parcial' },
    bloqueada: { cls: 'bg-red-100 text-red-800', label: '🚫 Bloqueadas' },
  };



  function render() {
    const consulta = busquedaEl.value.trim().toLowerCase();

    const lista = apps.filter((app) => {
      const coincideEstado = estadoActivo === 'todas' || app.status === estadoActivo;
      const coincideConsulta = !consulta || app.name.toLowerCase().includes(consulta) || app.category.toLowerCase().includes(consulta);

      return coincideEstado && coincideConsulta;
    });



    listaEl.innerHTML = lista
      .map((app) => `
        <div class="card">
          <div class="flex items-start justify-between gap-3">
            <div>
              <h3 class="font-bold text-gray-900">${app.name}</h3>
              <span class="text-xs text-gray-400">${app.category}</span>
            </div>
            <span class="whitespace-nowrap rounded-full px-2.5 py-0.5 text-xs font-semibold ${insignias[app.status].cls}">${insignias[app.status].label}</span>
          </div>
          <p class="mt-2 text-sm text-gray-600">${app.note}</p>
          ${app.alt ? `<p class="mt-1.5 text-sm"><span class="text-gray-500">Alternativa recomendada:</span> <span class="font-medium text-brand-600">${app.alt}</span></p>` : ''}
        </div>`)
      .join('');



    sinResultadosEl.classList.toggle('hidden', lista.length > 0);
  }



  busquedaEl.addEventListener('input', render);

  filtros.forEach((btn) => {
    btn.addEventListener('click', () => {
      estadoActivo = btn.dataset.status;

      filtros.forEach((b) => {
        const activo = b === btn;

        b.classList.toggle('btn-primary', activo);

        ['rounded-lg', 'border', 'border-gray-300', 'font-medium', 'text-gray-700'].forEach((c) => b.classList.toggle(c, !activo));
      });

      render();
    });
  });



  render();

})();</script>
