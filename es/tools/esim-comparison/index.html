<!DOCTYPE html> <script>(function(){const plans = [{"id":1,"name":"Explorador de China 5 GB","data":5,"dataLabel":"5 GB","days":7,"price":9.5,"network":"China Unicom","note":"Evita las restricciones de apps locales"},{"id":2,"name":"Explorador de China 10 GB","data":10,"dataLabel":"10 GB","days":15,"price":16,"network":"China Unicom","note":"Evita las restricciones de apps locales"},{"id":3,"name":"China continental ligera 3 GB","data":3,"dataLabel":"3 GB","days":7,"price":6.5,"network":"China Mobile","note":"Red local, sin enrutamiento VPN"},{"id":4,"name":"Gran China 8 GB","data":8,"dataLabel":"8 GB","days":30,"price":18.9,"network":"China Unicom","note":"Cubre China continental, Hong Kong, Macao y Taiwán"},{"id":5,"name":"Ilimitado diario","data":9999,"dataLabel":"Ilimitado*","days":10,"price":29,"network":"China Unicom","note":"Limite de uso justo despues de 2 GB/dia"},{"id":6,"name":"Negocios 20 GB","data":20,"dataLabel":"20 GB","days":30,"price":32,"network":"China Unicom","note":"Evita las restricciones de apps locales"},{"id":7,"name":"Viaje corto 1 GB","data":1,"dataLabel":"1 GB","days":3,"price":3.2,"network":"China Mobile","note":"Ideal para escalas cortas"},{"id":8,"name":"Familia 30 GB","data":30,"dataLabel":"30 GB","days":30,"price":45,"network":"China Unicom","note":"Se puede compartir mediante zona Wi-Fi"}];

  const rowsEl = document.getElementById('plan-rows');
  const noResults = document.getElementById('no-results');
  const sortBy = document.getElementById('sort-by');
  const filterNetwork = document.getElementById('filter-network');
  const filterData = document.getElementById('filter-data');

  function render() {
    let list = [...plans];
    const net = filterNetwork.value;
    const minData = Number(filterData.value);

    if (net !== 'all') list = list.filter((p) => p.network === net);
    if (minData > 0) list = list.filter((p) => p.data >= minData);

    switch (sortBy.value) {
      case 'price-asc': list.sort((a, b) => a.price - b.price); break;
      case 'price-desc': list.sort((a, b) => b.price - a.price); break;
      case 'data-desc': list.sort((a, b) => b.data - a.data); break;
      case 'days-desc': list.sort((a, b) => b.days - a.days); break;
    }

    rowsEl.innerHTML = list
      .map(
        (p) => `
      <tr class="border-b border-gray-100">
        <td class="py-3 pr-4 font-semibold text-gray-900">${p.name}</td>
        <td class="py-3 pr-4">${p.dataLabel}</td>
        <td class="py-3 pr-4">${p.days} d&iacute;as</td>
        <td class="py-3 pr-4 font-semibold">$${p.price.toFixed(2)}</td>
        <td class="py-3 pr-4">${p.network}</td>
        <td class="py-3 pr-4 text-gray-500">${p.note}</td>
      </tr>`
      )
      .join('');

    noResults.classList.toggle('hidden', list.length > 0);
  }

  [sortBy, filterNetwork, filterData].forEach((el) => el.addEventListener('change', render));
  render();
})();</script>
