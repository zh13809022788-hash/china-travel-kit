<!DOCTYPE html> <script>(function(){const apps = [{"name":"Поиск Google","category":"Google","status":"blocked","note":"Без VPN не работает.","alt":"Bing (работает) или Baidu"},{"name":"Google Maps","category":"Google","status":"partial","note":"Открывается, но данные по материковому Китаю могут быть неточными или смещенными.","alt":"Apple Maps, Amap или Baidu Maps"},{"name":"Gmail","category":"Google","status":"blocked","note":"Без VPN не работает.","alt":"Outlook или другой почтовый сервис не от Google"},{"name":"YouTube","category":"Google","status":"blocked","note":"Без VPN не работает.","alt":"Bilibili (местный сервис)"},{"name":"WhatsApp","category":"Мессенджеры","status":"blocked","note":"Без VPN не работает.","alt":"WeChat"},{"name":"Facebook","category":"Соцсети","status":"blocked","note":"Без VPN не работает.","alt":"WeChat Moments или RED"},{"name":"Instagram","category":"Соцсети","status":"blocked","note":"Без VPN не работает.","alt":"RED (Xiaohongshu)"},{"name":"X (Twitter)","category":"Соцсети","status":"blocked","note":"Без VPN не работает.","alt":"Weibo"},{"name":"Telegram","category":"Мессенджеры","status":"blocked","note":"Без VPN не работает.","alt":"WeChat"},{"name":"WeChat","category":"Мессенджеры","status":"works","note":"Полностью работает. Это основной сервис в Китае."},{"name":"Сервисы Apple (iMessage, App Store)","category":"Apple","status":"works","note":"Работают без проблем."},{"name":"Microsoft / Bing / Outlook","category":"Microsoft","status":"works","note":"Работают без проблем."},{"name":"Booking.com","category":"Путешествия","status":"works","note":"Работает без проблем."},{"name":"Airbnb","category":"Путешествия","status":"works","note":"Работает без проблем."},{"name":"Trip.com","category":"Путешествия","status":"works","note":"Полностью работает и особенно удобен для поездов и отелей."},{"name":"Alipay","category":"Оплата","status":"works","note":"Полностью работает и поддерживает иностранные карты."},{"name":"Uber","category":"Транспорт","status":"blocked","note":"В материковом Китае не работает.","alt":"DiDi"},{"name":"Netflix","category":"Медиа","status":"blocked","note":"В материковом Китае недоступен.","alt":"Местные стриминговые сервисы или загрузка контента заранее"},{"name":"Spotify","category":"Медиа","status":"blocked","note":"В материковом Китае недоступен.","alt":"QQ Music или заранее скачать музыку офлайн"}];

  const listEl = document.getElementById('app-list');
  const noResults = document.getElementById('no-results');
  const searchEl = document.getElementById('search');
  const filters = document.querySelectorAll('.status-filter');
  let activeStatus = 'all';

  const badge = {
    works: { cls: 'bg-green-100 text-green-800', label: '✅ Работает' },
    partial: { cls: 'bg-amber-100 text-amber-800', label: '⚠️ Частично работает' },
    blocked: { cls: 'bg-red-100 text-red-800', label: '🚫 Не работает' },
  };

  function render() {
    const q = searchEl.value.trim().toLowerCase();
    const list = apps.filter((a) => {
      const matchStatus = activeStatus === 'all' || a.status === activeStatus;
      const matchQuery = !q || a.name.toLowerCase().includes(q) || a.category.toLowerCase().includes(q);
      return matchStatus && matchQuery;
    });

    listEl.innerHTML = list
      .map((a) => `
        <div class="card">
          <div class="flex items-start justify-between gap-3">
            <div>
              <h3 class="font-bold text-gray-900">${a.name}</h3>
              <span class="text-xs text-gray-400">${a.category}</span>
            </div>
            <span class="whitespace-nowrap rounded-full px-2.5 py-0.5 text-xs font-semibold ${badge[a.status].cls}">${badge[a.status].label}</span>
          </div>
          <p class="mt-2 text-sm text-gray-600">${a.note}</p>
          ${a.alt ? `<p class="mt-1.5 text-sm"><span class="text-gray-500">Чем заменить:</span> <span class="font-medium text-brand-600">${a.alt}</span></p>` : ''}
        </div>`)
      .join('');

    noResults.classList.toggle('hidden', list.length > 0);
  }

  searchEl.addEventListener('input', render);
  filters.forEach((btn) => {
    btn.addEventListener('click', () => {
      activeStatus = btn.dataset.status;
      filters.forEach((b) => {
        const on = b === btn;
        b.classList.toggle('btn-primary', on);
        ['rounded-lg', 'border', 'border-gray-300', 'font-medium', 'text-gray-700'].forEach((c) => b.classList.toggle(c, !on));
      });
      render();
    });
  });

  render();
})();</script>
