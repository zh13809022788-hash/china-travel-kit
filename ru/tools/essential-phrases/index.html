<!DOCTYPE html> <script type="module">const n=document.querySelectorAll(".phrase-filter"),s=document.querySelectorAll(".phrase-group"),a=document.getElementById("print-btn"),d=["rounded-lg","border","border-gray-300","px-3","py-1.5","text-sm","font-medium","text-gray-700","hover:border-brand-400"];n.forEach(e=>{e.addEventListener("click",()=>{const r=e.dataset.filter;s.forEach(t=>{t.classList.toggle("hidden",r!=="all"&&t.dataset.group!==r)}),n.forEach(t=>{const o=t===e;t.classList.toggle("btn-primary",o),d.forEach(c=>t.classList.toggle(c,!o))})})});a?.addEventListener("click",()=>window.print());</script>
