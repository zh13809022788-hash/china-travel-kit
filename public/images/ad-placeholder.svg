<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 728 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="50%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="728" height="120" rx="8" fill="url(#bg)" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,4" />
  <!-- Decorative circles -->
  <circle cx="60" cy="60" r="28" fill="#e2e8f0" opacity="0.5" />
  <circle cx="60" cy="60" r="18" fill="#cbd5e1" opacity="0.3" />
  <circle cx="60" cy="60" r="8" fill="#94a3b8" opacity="0.2" />
  <!-- Lines -->
  <rect x="105" y="48" width="200" height="6" rx="3" fill="url(#line)" />
  <rect x="105" y="62" width="140" height="4" rx="2" fill="#e2e8f0" />
  <!-- Right side - camera icon -->
  <circle cx="680" cy="60" r="22" fill="#e2e8f0" opacity="0.4" />
  <circle cx="680" cy="60" r="12" fill="#cbd5e1" opacity="0.3" />
  <rect x="674" y="48" width="4" height="6" rx="1" fill="#94a3b8" opacity="0.2" />
  <!-- Bottom text -->
  <text x="364" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" letter-spacing="1.5">SPONSORED CONTENT</text>
</svg>
